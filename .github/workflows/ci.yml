name: CMake CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure debug build
        run: cmake -S . -B build/debug -DCMAKE_BUILD_TYPE=Debug

      - name: Build debug target
        run: cmake --build build/debug --parallel

      - name: Run tests
        run: ctest --test-dir build/debug --output-on-failure

      - name: Configure sanitizer build
        run: cmake -S . -B build/sanitizers -DCMAKE_BUILD_TYPE=Debug -DTSP_ENABLE_SANITIZERS=ON

      - name: Build sanitizer target
        run: cmake --build build/sanitizers --parallel

      - name: Run sanitizer tests
        run: ctest --test-dir build/sanitizers --output-on-failure
